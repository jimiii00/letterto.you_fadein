<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #fff;
        }

        .visual {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .envelope {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1;
        }

        .cards-area {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 1400px;
            height: 1100px;
            z-index: 5;
        }

        .cards-area img {
            position: absolute;
            object-fit: contain;
        }

        .card1 { width: 600px; height: 600px; top: 0px; left: 0px; }
        .card2 { width: 600px; height: 600px; top: 0px; left: 350px; }
        .card3 { width: 600px; height: 600px; top: 0px; left: 700px; }
        .card4 { width: 600px; height: 600px; top: 0px; left: 1050px; }
        .card5 { width: 800px; height: 800px; top: 350px; left: -80px; }
        .card6 { width: 800px; height: 800px; top: 350px; left: 280px; }
        .card7 { width: 750px; height: 750px; top: 350px; left: 640px; }
        .card8 { width: 800px; height: 800px; top: 350px; left: 980px; }
    </style>
</head>
<body>
    <section class="visual">
        <img src="./images/half.png" alt="" class="envelope">
        <div class="cards-area">
            <img src="./images/1.png" alt="" class="card1 fade-in">
            <img src="./images/2.png" alt="" class="card2 fade-in">
            <img src="./images/3.png" alt="" class="card3 fade-in">
            <img src="./images/4.png" alt="" class="card4 fade-in">
            <img src="./images/5.png" alt="" class="card5 fade-in">
            <img src="./images/6.png" alt="" class="card6 fade-in">
            <img src="./images/7.png" alt="" class="card7 fade-in">
            <img src="./images/8.png" alt="" class="card8 fade-in">
        </div>
    </section>

    <script>
        const fadeEls = document.querySelectorAll('.visual .fade-in');
        gsap.from(fadeEls, {
            duration: 1.5,
            y: 600,
            scale: 0,
            ease: "back.out(4)",
            opacity: 0,
            stagger: 0.25
        })
    </script>
</body>
</html>
