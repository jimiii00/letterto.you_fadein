<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>편지에 마음을 담아</title>
  <link rel="icon" type="image/png" href="./images/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    *:focus { outline: none; }

    body {
      background: #12121f;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }


    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* 헤더 */
    .site-header {
      position: absolute;
      top: 0; left: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      padding: 18px 28px;
      gap: 0;
    }
    .site-title {
      font-family: 'Georgia', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.82);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .header-divider {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.18);
      margin: 0 20px;
      flex-shrink: 0;
    }
    .bgm-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bgm-toggle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,220,120,0.4);
      background: rgba(255,220,120,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .bgm-toggle:hover { background: rgba(255,220,120,0.18); }
    .bgm-toggle svg {
      width: 11px;
      height: 11px;
      fill: rgba(255,220,120,0.75);
    }
    .bgm-track-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .bgm-track-name {
      font-family: Arial, sans-serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.35);
    }
    .bgm-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
    }
    .bgm-bar {
      width: 2px;
      border-radius: 1px;
      background: rgba(255,220,120,0.55);
      animation: eq 1.1s ease-in-out infinite alternate;
    }
    .bgm-bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
    .bgm-bar:nth-child(2) { height: 14px; animation-delay: 0.15s; }
    .bgm-bar:nth-child(3) { height: 10px; animation-delay: 0.3s; }
    .bgm-bar:nth-child(4) { height: 16px; animation-delay: 0.1s; }
    .bgm-bar:nth-child(5) { height: 8px;  animation-delay: 0.25s; }
    .bgm-bar.paused { animation-play-state: paused; }
    @keyframes eq {
      from { transform: scaleY(0.25); opacity: 0.35; }
      to   { transform: scaleY(1);    opacity: 1; }
    }

    /* 우체통 */
    .mailbox-wrap {
      position: absolute;
      transform: translateY(-50%);
      left: 2vw;
      top: 50%;
      width: 18vw;
      max-width: 300px;
      min-width: 260px;
    }
    .mailbox-wrap img.post-img { width: 100%; display: block; }

    .door-hitbox {
      position: absolute;
      bottom: 10%; left: 8%;
      width: 84%; height: 44%;
      cursor: pointer; z-index: 10;
    }

    .door-btn {
      position: absolute;
      bottom: 28%; left: 50%;
      transform: translateX(-50%);
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(255,220,120,0.18);
      border: 1.5px solid rgba(255,220,120,0.55);
      z-index: 11; pointer-events: none;
    }
    .door-btn::before, .door-btn::after {
      content: '';
      position: absolute; inset: -1px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,220,120,0.5);
      animation: ripple 2s ease-out infinite;
    }
    .door-btn::after { animation-delay: 1s; }
    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.7; }
      100% { transform: scale(2.6); opacity: 0; }
    }
    .door-btn-dot {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,220,120,0.85);
    }
    .click-hint {
      position: absolute; bottom: -24px; left: 50%;
      transform: translateX(-50%);
      font-size: 9px; font-family: Arial, sans-serif;
      color: rgba(255,255,255,0.3); letter-spacing: 2px;
      white-space: nowrap; transition: opacity 0.4s;
    }

    /* 편지 카드 */
    .letters-container {
      position: absolute; inset: 0;
      pointer-events: none;
    }
    .letter-card {
      position: absolute;
      cursor: pointer; pointer-events: auto; opacity: 0;
    }
    .letter-card:hover {
      z-index: 20;
      filter: brightness(1.06);
    }
    .letter-card img {
      display: block;
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    /* 편지지 뷰 */
    .letter-view {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      z-index: 50; pointer-events: none;
    }
    .letter-view.active { display: flex; pointer-events: auto; }

    .letter-paper {
      position: relative; opacity: 0;
      border-radius: 3px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.7);
      max-width: 88vw; max-height: 88vh;
    }
    .letter-paper img.paper-img {
      display: block;
      max-width: 88vw; max-height: 88vh;
      width: auto; height: auto;
      border-radius: 3px;
    }
    .paper-close {
      position: absolute; top: 12px; left: 14px;
      background: rgba(255,255,255,0.6); border: none;
      border-radius: 50%; width: 30px; height: 30px;
      font-size: 17px; cursor: pointer; color: #3a2810;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: background 0.2s;
    }
    .paper-close:hover { background: rgba(255,255,255,0.95); }
  </style>
</head>
<body>

<!-- ✏️ BGM 파일 경로 -->
<audio id="bgm" src="./audio/bgm.mp3" loop></audio>

<div class="scene">

  <!-- 헤더 -->
  <header class="site-header">
    <span class="site-title">편지에 마음을 담아</span>
    <div class="header-divider"></div>
    <div class="bgm-section">
      <button class="bgm-toggle" id="bgmBtn" aria-label="BGM 재생/정지">
        <svg id="iconPlay"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <div class="bgm-track-wrap">
        <!-- ✏️ 곡 이름 여기서 바꾸세요 -->
        <span class="bgm-track-name">김광진 - 편지</span>
        <div class="bgm-bars" id="bgmBars">
          <div class="bgm-bar paused"></div>
          <div class="bgm-bar paused"></div>
          <div class="bgm-bar paused"></div>
          <div class="bgm-bar paused"></div>
          <div class="bgm-bar paused"></div>
        </div>
      </div>
    </div>
  </header>

  

  <!-- 우체통 -->
  <div class="mailbox-wrap">
    <img src="./images/post.png" alt="우체통" class="post-img">
    <div class="door-hitbox" id="doorHitbox"></div>
    <div class="door-btn" id="doorBtn"><div class="door-btn-dot"></div></div>
    <div class="click-hint" id="clickHint">클릭해서 우체통에 들어있는 편지를 꺼내주세요.</div>
  </div>

  <!-- 편지 카드 -->
  <div class="letters-container" id="lettersContainer">
    <!-- ✏️ data-paper에 각 속지 파일 경로 -->
    <div class="letter-card" data-index="0" data-paper="./images/in1.jpg"><img src="./images/letter1.png" alt="letter1"></div>
    <div class="letter-card" data-index="1" data-paper="./images/in2.jpg"><img src="./images/letter2.png" alt="letter2"></div>
    <div class="letter-card" data-index="2" data-paper="./images/in3.jpg"><img src="./images/letter3.jpg" alt="letter3"></div>
    <div class="letter-card" data-index="3" data-paper="./images/in4.jpg"><img src="./images/letter4.jpg" alt="letter4"></div>
    <div class="letter-card" data-index="4" data-paper="./images/in5.jpg"><img src="./images/letter5.jpg" alt="letter5"></div>
    <div class="letter-card" data-index="5" data-paper="./images/in6.png"><img src="./images/letter6.png" alt="letter6"></div>
    <div class="letter-card" data-index="6" data-paper="./images/in7.jpg"><img src="./images/letter7.jpg" alt="letter7"></div>
    <div class="letter-card" data-index="7" data-paper="./images/in8.jfif"><img src="./images/letter8.png" alt="letter8"></div>
  </div>

  <!-- 편지지 뷰 -->
  <div class="letter-view" id="letterView">
    <div class="letter-paper" id="letterPaper">
      <button class="paper-close" id="paperClose">×</button>
      <img src="" alt="편지지" class="paper-img" id="paperImg">
    </div>
  </div>

</div>

<script>
  const cards = document.querySelectorAll('.letter-card');
  let opened = false;

  // ✏️ in7 속지 크기 (data-index="6")
  const paperSizes = {
    6: { width: '520px', height: 'auto' },
  };

  function layout() {
    const W = window.innerWidth;
    const H = window.innerHeight;

    const areaLeft   = W * 0.23;
    const areaRight  = W * 0.99;
    const areaTop    = H * 0.04;
    const areaBottom = H * 0.96;

    const cols = 4;
    const rows = 2;
    const cellW = (areaRight - areaLeft) / cols;
    const cellH = (areaBottom - areaTop) / rows;

    const rotations = [-12, 8, -6, 13, 15, -17, 7, -10];

    // ✏️ 각 편지 카드 크기 (px)
    const sizes = [
      { w: 280, h: 340 },
      { w: 300, h: 350 },
      { w: 300, h: 360 },
      { w: 260, h: 320 },
      { w: 270, h: 330 },
      { w: 310, h: 370 },
      { w: 300, h: 350 },
      { w: 290, h: 350 },
    ];

    return Array.from({ length: 8 }, (_, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx = areaLeft + cellW * col + cellW / 2;
      const cy = areaTop  + cellH * row + cellH / 2;
      return {
        x: cx - sizes[i].w / 2,
        y: cy - sizes[i].h / 2,
        w: sizes[i].w,
        h: sizes[i].h,
        r: rotations[i],
      };
    });
  }

  const startX = window.innerWidth  * 0.12;
  const startY = window.innerHeight * 0.55;

  cards.forEach(card => {
    gsap.set(card, { left: startX, top: startY, width: 10, height: 10, rotation: 0 });
  });

  // BGM
  const bgm     = document.getElementById('bgm');
  const bars    = document.querySelectorAll('.bgm-bar');
  bgm.volume    = 0.5;
  let bgmStarted = false;

  function setBgmPlaying(playing) {
    document.getElementById('iconPlay').style.display  = playing ? 'none'  : 'block';
    document.getElementById('iconPause').style.display = playing ? 'block' : 'none';
    bars.forEach(b => b.classList.toggle('paused', !playing));
  }

  function startBgm() {
    if (!bgmStarted) {
      bgm.play();
      bgmStarted = true;
      setBgmPlaying(true);
    }
  }

  document.addEventListener('click', startBgm, { once: true });

  document.getElementById('bgmBtn').addEventListener('click', e => {
    e.stopPropagation();
    if (bgm.paused) {
      bgm.play();
      setBgmPlaying(true);
    } else {
      bgm.pause();
      setBgmPlaying(false);
    }
    bgmStarted = true;
  });

  // 우체통
  document.getElementById('doorHitbox').addEventListener('click', () => {
    if (opened) return;
    opened = true;

    gsap.to('#doorBtn', { opacity: 0, duration: 0.3 });
    document.getElementById('clickHint').style.opacity = '0';

    const pos = layout();
    cards.forEach((card, i) => {
      gsap.to(card, {
        left:     pos[i].x,
        top:      pos[i].y,
        width:    pos[i].w,
        height:   pos[i].h,
        rotation: pos[i].r,
        opacity:  1,
        duration: 1.2,
        delay:    0.2 + i * 0.1,
        ease:     'back.out(2.4)',
      });
    });
  });

  // 편지 카드
  cards.forEach(card => {
    card.addEventListener('mouseenter', () => {
      gsap.to(card, { y: -12, duration: 0.3, ease: 'power2.out' });
    });
    card.addEventListener('mouseleave', () => {
      gsap.to(card, { y: 0, duration: 0.3, ease: 'power2.out' });
    });

    card.addEventListener('click', () => {
      const idx      = parseInt(card.dataset.index);
      const paperImg = document.getElementById('paperImg');

      paperImg.src = card.dataset.paper;

      if (paperSizes[idx]) {
        paperImg.style.width     = paperSizes[idx].width  || 'auto';
        paperImg.style.height    = paperSizes[idx].height || 'auto';
        paperImg.style.maxWidth  = '88vw';
        paperImg.style.maxHeight = '88vh';
      } else {
        paperImg.style.width  = 'auto';
        paperImg.style.height = 'auto';
      }

      const view  = document.getElementById('letterView');
      const paper = document.getElementById('letterPaper');
      view.classList.add('active');
      gsap.fromTo(paper, { opacity: 0 }, { opacity: 1, duration: 0.65, ease: 'power2.out' });
    });
  });

  function closeLetter() {
    const paper = document.getElementById('letterPaper');
    gsap.to(paper, {
      opacity: 0, duration: 0.35, ease: 'power2.in',
      onComplete: () => {
        document.getElementById('letterView').classList.remove('active');
        document.getElementById('paperImg').src = '';
      }
    });
  }

  document.getElementById('paperClose').addEventListener('click', closeLetter);
  document.getElementById('letterView').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLetter();
  });
</script>
</body>
</html>
